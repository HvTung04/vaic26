services:
  postgres:
    image: postgres:16-alpine
    container_name: gaplens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaplens
      POSTGRES_PASSWORD: gaplens
      POSTGRES_DB: gaplens
    ports:
      - "5432:5432"
    volumes:
      - gaplens_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaplens -d gaplens"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: gaplens-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: gaplens
      MONGO_INITDB_ROOT_PASSWORD: gaplens
      MONGO_INITDB_DATABASE: gaplens
    ports:
      - "27017:27017"
    volumes:
      - gaplens_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gaplens-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://gaplens:gaplens@postgres:5432/gaplens
      MONGO_URL: mongodb://gaplens:gaplens@mongo:27017/?authSource=admin
      MONGO_DB: gaplens
      JWT_SECRET: change-me-in-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      CORS_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GAPLENS_LLM_MODEL: ${GAPLENS_LLM_MODEL:-gpt-4o}
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - gaplens_uploads:/app/uploads
      - ./docs:/docs:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: gaplens-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  gaplens_postgres_data:
  gaplens_mongo_data:
  gaplens_uploads:
